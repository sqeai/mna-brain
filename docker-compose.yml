services:
  postgres:
    image: postgres:16-alpine
    container_name: mna-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mna
    ports:
      - "5440:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mna"]
      interval: 5s
      timeout: 5s
      retries: 10

  # S3-compatible object storage for local dev / CI.
  # Web console: http://localhost:9001 (admin/admin123)
  # API endpoint: http://localhost:9000
  minio:
    image: minio/minio:latest
    container_name: mna-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot init: create the mna-files bucket and set a public read policy
  # so presigned URLs work the same way as AWS S3.
  minio-init:
    image: minio/mc:latest
    container_name: mna-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/mna-files;
      echo 'bucket mna-files ready';
      "

  app:
    build: .
    container_name: mna-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mna
      NODE_ENV: development
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_S3_BUCKET: mna-files
      AWS_S3_ENDPOINT: http://minio:9000
      # Presigned URLs must be reachable from the browser, which can't resolve
      # `minio` — expose the host-mapped port instead.
      AWS_S3_PUBLIC_ENDPOINT: http://localhost:9000
      AWS_S3_FORCE_PATH_STYLE: "true"
    ports:
      - "3000:3000"
    volumes:
      # `:z` relabels the bind mount for SELinux (Fedora / RHEL). Harmless on
      # non-SELinux systems. Without it: EACCES on /app/package.json.
      - .:/app:z
      - app-node-modules:/app/node_modules
      - app-next-cache:/app/.next

volumes:
  postgres-data:
  minio-data:
  app-node-modules:
  app-next-cache:
