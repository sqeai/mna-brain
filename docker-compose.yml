services:
  postgres:
    image: postgres:16-alpine
    container_name: mna-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mna
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mna"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: mna-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mna
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - app-node-modules:/app/node_modules
      - app-next-cache:/app/.next

volumes:
  postgres-data:
  app-node-modules:
  app-next-cache:
